name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: \${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sadeqisaidmohaddes-star.github.io/techstack-advisor/
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload app
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
